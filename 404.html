<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Restar Solar</title>
<meta name="robots" content="noindex">
<style>
:root{
  --bg:#FFFFFF;
  --text:#333333;
  --muted:#5B5F66;
  --line:#E1E5EA;
  --navy:#004598;
  --navy-deep:#00306B;
  --sun:#FF9600;
  --ember:#E67E00;
  --display:Tahoma,"Segoe UI",Arial,"Helvetica Neue",Helvetica,sans-serif;
  --body:Tahoma,"Segoe UI",Arial,"Helvetica Neue",Helvetica,sans-serif;
  --maxw:1180px;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--body);color:var(--text);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased;}
h1{font-family:var(--display);font-weight:600;line-height:1.04;letter-spacing:-.015em;margin:0;color:var(--text)}
a{color:inherit}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.header{background:#fff;border-bottom:1px solid var(--line)}
.header .wrap{display:flex;align-items:center;padding-top:14px;padding-bottom:14px}
.brand img{height:44px;width:auto;object-fit:contain}
main{min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:48px 24px}
.card{max-width:560px;text-align:center}
.code{font-family:var(--display);font-weight:700;font-size:88px;line-height:1;color:var(--navy);margin-bottom:8px}
h1{font-size:28px;margin-bottom:10px}
p{color:var(--muted);font-size:16px;margin:0 0 8px}
.fr{font-size:14px;color:var(--muted);margin-bottom:32px}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--body);font-weight:700;font-size:14px;padding:12px 22px;border-radius:4px;cursor:pointer;border:1px solid transparent;text-decoration:none;transition:transform .15s ease, box-shadow .2s ease, background .2s ease}
.btn--sun{background:var(--sun);color:#fff;box-shadow:0 4px 14px -4px rgba(255,150,0,.6)}
.btn--sun:hover{transform:translateY(-2px);background:var(--ember)}
.btn--ghost{background:transparent;color:var(--text);border-color:#B8BFCC}
.btn--ghost:hover{transform:translateY(-2px);border-color:var(--navy);color:var(--navy)}
.btn svg{width:18px;height:18px}
footer{border-top:1px solid var(--line);padding:24px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<header class="header">
  <div class="wrap">
    <a href="index.html" class="brand" aria-label="Restar Solar home">
      <img src="logo.webp" alt="Restar Solar">
    </a>
  </div>
</header>
<main>
  <div class="card">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <p class="fr">La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <div class="actions">
      <a class="btn btn--sun" href="index.html">Back to home / Retour à l'accueil</a>
      <a class="btn btn--ghost" href="index.html#products">Products / Produits</a>
      <a class="btn btn--ghost" href="index.html#contact">Contact</a>
    </div>
  </div>
</main>
<footer>© 2026 Restar Solar. Solar supply &amp; installation · Cameroon</footer>
</body>
</html>
